function saveApp() {
  const status = document.getElementById("saveStatus");
  if (!__hydrated) { if (status) status.textContent = "未保存（読込中）"; return; }
  const onOk = () => {
    __hasDirtyChanges = false;
    if (status) {
      status.textContent = "保存済み";
      setTimeout(() => { try { if (!__hasDirtyChanges) status.textContent = ""; } catch {} }, 2000);
    }
    try { scheduleCharCountUpdate(); } catch {}
  };

  const onFail = (err) => {
    if (status) status.textContent = "保存失敗（容量/権限の可能性）";
    try { console.warn("saveApp failed:", err); } catch {}

    // If localStorage quota was exceeded, automatically fall back to memory so UI keeps working.
    if (__storageAdapter && __storageAdapter.name === "localStorage" && isQuotaExceededError(err)) {
      try {
        __storageAdapter = createMemoryAdapter();
        const r2 = __storageAdapter.save(STORAGE_KEY, app);
        asPromise(r2).then(() => {
          if (status) status.textContent = "容量上限: 一時保存（再読み込みで消えます）";
        }).catch(() => {});
      } catch {}
    }
  };

  try {
    if (status) status.textContent = "保存中…";
    const r = __storageAdapter.save(STORAGE_KEY, app);
    asPromise(r).then(onOk).catch(onFail);
  } catch (err) {
    onFail(err);
  }
}

  const SCENE_STATUS = {
    unused: { label: "未使用" },
    used: { label: "使用済" },

// KPメモ: 本文とは分離したデータストア（アンカーIDで紐付け）
function ensureKpMemos(s){
  if (!s || typeof s !== "object") return;
  // Backward compat: object-map -> array
  if (s.kpMemos && !Array.isArray(s.kpMemos) && typeof s.kpMemos === "object") {
    try {
      s.kpMemos = Object.values(s.kpMemos);
    } catch { s.kpMemos = []; }
  }
  if (!Array.isArray(s.kpMemos)) s.kpMemos = [];
  // Normalize each memo shape
  for (const n of s.kpMemos) {
    if (!n || typeof n !== "object") continue;
    if (!n.id) n.id = "kp_" + Math.random().toString(36).slice(2, 10);
    if (typeof n.title !== "string") n.title = "";
    if (typeof n.body !== "string") n.body = "";
    // backward compat: anchorId based memos
    if ((n.sceneId === undefined || n.sceneId === null) && typeof n.anchorId === "string" && n.anchorId) {
      n.sceneId = null;
    }
        if (typeof n.sceneId !== "string" && n.sceneId !== null) n.sceneId = n.sceneId == null ? null : String(n.sceneId);
    if (!n.createdAt) n.createdAt = Date.now();
    if (!n.updatedAt) n.updatedAt = n.createdAt;
    if (typeof n.order !== "number") n.order = 0;
  }
  // Stable order (keep insertion order if order ties)
  s.kpMemos.sort((a,b) => (a.order||0) - (b.order||0) || (a.createdAt||0) - (b.createdAt||0));
}

  function normalizeScenarioData(s) {
    if (!s) return;
    if (!Array.isArray(s.chapters)) s.chapters = [];
    if (!s.mode) s.mode = "edit";
    if (!s.updatedAt) s.updatedAt = Date.now();

    s.chapters.forEach(ch => {
      if (!Array.isArray(ch.scenes)) ch.scenes = [];
      ch.scenes.forEach(sc => {
        if (!sc || typeof sc !== "object") return;
        if (!("status" in sc) || !SCENE_STATUS[sc.status]) sc.status = "unused";
        if (!Array.isArray(sc.tags)) sc.tags = [];
        if (!("body" in sc)) sc.body = "";
      });
    });

    // KPメモ
    ensureKpMemos(s);
  }

  // UI state
  const __kpUI = { activeId: null };
  // KPメモ context: which scene is currently active (selected / focused)
  const __kpCTX = { sceneId: null, chapterId: null };

  function setActiveKpContext(sceneId, chapterId){
    try{
      __kpCTX.sceneId = sceneId != null ? String(sceneId) : null;
      __kpCTX.chapterId = chapterId != null ? String(chapterId) : null;
      // If panel is open, refresh list for this scene
      try { renderKpPanel(); } catch {}
    }catch{}
  }

  function setActiveKpContextFromElement(el){
    try{
      const blk = el && el.closest ? el.closest(".scene-block") : null;
      if (blk && blk.dataset && blk.dataset.sceneId){
        setActiveKpContext(blk.dataset.sceneId, blk.dataset.chapterId || null);
      }
    }catch{}
  }


  function getKpMemoById(s, id){
    ensureKpMemos(s);
    return (s.kpMemos || []).find(n => n.id === id) || null;
  }

  function updateKpMemo(id, patch){
    const s = getCurrentScenario();
    if (!s) return;
    ensureKpMemos(s);
    const n = getKpMemoById(s, id);
    if (!n) return;
    Object.assign(n, patch || {});
    n.updatedAt = Date.now();
    s.updatedAt = Date.now();
    saveApp();
  }

  function deleteKpMemo(id){
    const s = getCurrentScenario();
    if (!s) return;
    ensureKpMemos(s);
    const idx = (s.kpMemos || []).findIndex(n => n.id === id);
    if (idx !== -1) s.kpMemos.splice(idx, 1);
    // 本文内の🔒目印も「KPメモバーから削除した時だけ」消えるようにする
    try{ removeKpAnchorsEverywhere(id); }catch{}
    s.updatedAt = Date.now();
    saveApp();
    if (__kpUI.activeId === id) __kpUI.activeId = null;
    renderKpPanel();
  }

  // Remove KP anchors from:
  // 1) currently rendered editors (DOM)
  // 2) all scene bodies stored in scenario data
  function removeKpAnchorsEverywhere(memoId){
    const s = getCurrentScenario();
    if (!s || !memoId) return;
    const id = String(memoId);

    // 1) DOM
    try{
      document.querySelectorAll(`.kp-anchor[data-kp-id="${CSS.escape(id)}"]`).forEach(el => { try{ el.remove(); }catch{} });
    }catch{}

    // 2) Stored scene HTML
    try{
      const parser = new DOMParser();
      const toClean = (html) => {
        const src = (typeof html === 'string') ? html : String(html||'');
        const doc = parser.parseFromString(`<div id="__kpwrap__">${src}</div>`, 'text/html');
        const wrap = doc.getElementById('__kpwrap__');
        if (!wrap) return src;
        wrap.querySelectorAll(`.kp-anchor[data-kp-id="${CSS.escape(id)}"]`).forEach(n => { try{ n.remove(); }catch{} });
        return wrap.innerHTML;
      };
      (s.chapters || []).forEach(ch => {
        (ch.scenes || []).forEach(sc => {
          if (!sc) return;
          if (typeof sc.body === 'string' && sc.body.includes('kp-anchor')) {
            sc.body = toClean(sc.body);
          }
        });
      });
    }catch{}
  }

  function openKpPanel(memoId){
    if (memoId) __kpUI.activeId = memoId;
    document.body.classList.add("kp-panel-open");
    renderKpPanel();
  }
  function closeKpPanel(){
    document.body.classList.remove("kp-panel-open");
  }

  function scrollToKpAnchor(memoId){
    const root = document.querySelector(".main") || document.body;
    const sel = `.kp-anchor[data-kp-id="${CSS.escape(String(memoId))}"]`;
    const el = document.querySelector(sel);
    if (el && typeof el.scrollIntoView === "function") {
      el.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
      try{
        el.classList.add("kp-anchor-flash");
        setTimeout(() => el.classList.remove("kp-anchor-flash"), 900);
      }catch{}
    } else {
      showToast("本文内の位置が見つかりませんでした");
    }
  }

  function getSceneTitleById(s, sceneId){
    if (!s || !sceneId) return "";
    for (const ch of (s.chapters || [])){
      const sc = (ch.scenes || []).find(x => x && x.id === sceneId);
      if (sc) return String(sc.title || "");
    }
    return "";
  }

  function renderKpPanel(){
  const ctxEl = document.getElementById("kpPanelContext");
  const bodyEl = document.getElementById("kpPanelBody");
  if (!ctxEl || !bodyEl) return;

  const s = getCurrentScenario();
  if (!s){
    ctxEl.textContent = "（シナリオ未選択）";
    bodyEl.innerHTML = '<div class="kp-empty">シナリオを作成/選択してください。</div>';
    return;
  }

  ensureKpMemos(s);

  const sceneId = __kpCTX.sceneId || null;
  const sceneTitle = sceneId ? (getSceneTitleById(s, sceneId) || "（無題）") : "";
  ctxEl.textContent = sceneId ? `（${sceneTitle} のメモ）` : "（シーンを選択してください）";

  // pick visible memos for current scene (if scene chosen), otherwise show recent memos
  const memosAll = (s.kpMemos || []).slice();
  memosAll.sort((a,b)=>(a.order||0)-(b.order||0) || (a.createdAt||0)-(b.createdAt||0));

  const memos = sceneId ? memosAll.filter(n => n.sceneId === sceneId) : memosAll.slice(-20);
  if (!__kpUI.activeId && memos.length) __kpUI.activeId = memos[0].id;

  const active = __kpUI.activeId ? getKpMemoById(s, __kpUI.activeId) : null;

  bodyEl.innerHTML = "";

  // Tabs (horizontal)
  const tabsWrap = document.createElement("div");
  tabsWrap.className = "kp-tabs-wrap";

  const tabs = document.createElement("div");
  tabs.className = "kp-tabs";

  memos.forEach((n, idx) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "kp-tab" + ((n.id === __kpUI.activeId) ? " active" : "");
    btn.textContent = (n.title && String(n.title).trim()) ? String(n.title).trim() : `（無題${idx+1}）`;
    btn.addEventListener("click", () => { __kpUI.activeId = n.id; renderKpPanel(); });
    tabs.appendChild(btn);
  });

  tabsWrap.appendChild(tabs);
  bodyEl.appendChild(tabsWrap);

// Editor card
  const card = document.createElement("div");
  card.className = "kp-card";

  if (!active){
    card.innerHTML = '<div class="kp-empty">本文の🔒をクリックするか、＋でメモを追加してください。</div>';
    bodyEl.appendChild(card);

  }

  const head = document.createElement("div");
  head.className = "kp-card-head";

  const title = document.createElement("input");
  title.type = "text";
  title.placeholder = "タイトル";
  title.value = active.title || "";
  title.addEventListener("input", () => updateKpMemo(active.id, { title: title.value }));

  const tools = document.createElement("div");

  const btnJump = document.createElement("button");

  const btnCopy = document.createElement("button");
  btnCopy.type = "button";

  function attachKpAnchorSafety(quill){
  if (!quill) return;
  // Track last focused Quill
  try{
    quill.root.addEventListener("focusin", () => { window.__trpg_lastFocusedQuill = quill; });
    quill.root.addEventListener("mousedown", () => { window.__trpg_lastFocusedQuill = quill; });
  }catch{}

  // KP anchor is NOT deletable from the main text.
  const denyDelete = () => { try{ showToast("KPメモの🔒は本文から削除できません（KPメモバーから削除してください）"); }catch{} };

  // Robust protection: block via beforeinput/keydown as well (Quill keyboard bindings can be bypassed)
  const rangeHasKpAnchor = (range) => {
    if (!range) return false;
    try{
      if (range.length > 0){
        const d = quill.getContents(range.index, range.length);
        return (d && d.ops || []).some(op => op && op.insert && op.insert.kpanchor);
      }
      return false;
    }catch{ return false; }
  };
  const leafIsKpAnchor = (index) => {
    try{
      const [leaf] = quill.getLeaf(index);
      return !!(leaf && leaf.statics && leaf.statics.blotName === 'kpanchor');
    }catch{ return false; }
  };
  const willDeleteKpAnchor = (range, dir) => {
    if (!range) return false;
    if (range.length > 0) return rangeHasKpAnchor(range);
    if (dir === 'backward'){
      if (range.index <= 0) return false;
      return leafIsKpAnchor(range.index - 1);
    }
    if (dir === 'forward'){
      return leafIsKpAnchor(range.index);
    }
    return false;
  };

  try{
    const onBeforeInput = (e) => {
      const t = e && e.inputType ? String(e.inputType) : '';
      if (!t.startsWith('delete')) return;
      const range = quill.getSelection();
      if (!range) return;
      const dir = (t === 'deleteContentBackward' || t === 'deleteByCut' || t === 'deleteByDrag') ? 'backward'
                : (t === 'deleteContentForward') ? 'forward'
                : (t === 'delete') ? 'forward'
                : null;

      if (range.length > 0){
        if (rangeHasKpAnchor(range)){
          e.preventDefault();
          e.stopPropagation();
          denyDelete();
        }
        return;
      }
      if (dir && willDeleteKpAnchor(range, dir)){
        e.preventDefault();
        e.stopPropagation();
        denyDelete();
      }
    };
    quill.root.addEventListener('beforeinput', onBeforeInput, true);

    const onKeyDown = (e) => {
      if (!e) return;
      const k = e.key;
      if (k !== 'Backspace' && k !== 'Delete') return;
      const range = quill.getSelection();
      if (!range) return;
      const dir = (k === 'Backspace') ? 'backward' : 'forward';
      if (willDeleteKpAnchor(range, dir)){
        e.preventDefault();
        e.stopPropagation();
        denyDelete();
      }
    };
    quill.root.addEventListener('keydown', onKeyDown, true);
  }catch{}

  try{
    quill.keyboard.addBinding({ key: 8 }, (range) => { // backspace
      if (!range) return true;

      // If selection range includes a KP anchor, block
      if (range.length > 0){
        try{
          const d = quill.getContents(range.index, range.length);
          const has = (d && d.ops || []).some(op => op && op.insert && op.insert.kpanchor);
          if (has){ denyDelete(); return false; }
        }catch{}
        return true;
      }
      if (range.index <= 0) return true;
      const [leaf] = quill.getLeaf(range.index - 1);
      if (leaf && leaf.statics && leaf.statics.blotName === "kpanchor"){
        denyDelete();
        return false;
      }
      return true;
    });
    quill.keyboard.addBinding({ key: 46 }, (range) => { // delete
      if (!range) return true;

      // If selection range includes a KP anchor, block
      if (range.length > 0){
        try{
          const d = quill.getContents(range.index, range.length);
          const has = (d && d.ops || []).some(op => op && op.insert && op.insert.kpanchor);
          if (has){ denyDelete(); return false; }
        }catch{}
        return true;
      }
      const [leaf] = quill.getLeaf(range.index);
      if (leaf && leaf.statics && leaf.statics.blotName === "kpanchor"){
        denyDelete();
        return false;
      }
      return true;
    });
  }catch{}

  // Toolbar hint for selected KP anchor
  try{
    const toolbar = quill.getModule("toolbar");
    const toolbarEl = toolbar && toolbar.container ? toolbar.container : null;
    if (toolbarEl && !toolbarEl.querySelector(".kp-toolbar-hint")){
      const hint = document.createElement("span");
      hint.className = "kp-toolbar-hint";
      hint.style.display = "none";
      hint.innerHTML = '<span>🔒</span><span class="muted">KPメモ:</span><span class="kp-title"></span><button type="button" title="開く">開く</button>';
      toolbarEl.appendChild(hint);
      hint.querySelector("button").addEventListener("click", () => {
        const id = hint.dataset.kpId;
        if (id) {
          const card = document.getElementById(`kp-edit-${id}`);
          if (card) {
            card.scrollIntoView({ behavior: "smooth", block: "center" });
            const ta = card.querySelector("textarea");
            if (ta) ta.focus();
          } else {
            try { openKpPanel(String(id)); } catch {}
          }
        }
      });

      quill.on("selection-change", (range) => {
        try{
          if (!range){ hint.style.display="none"; return; }
          const [leaf] = quill.getLeaf(range.index);
          const blot = leaf;
          if (blot && blot.statics && blot.statics.blotName === "kpanchor"){
            const id = blot.domNode && (blot.domNode.dataset.kpId || blot.domNode.getAttribute("data-kp-id"));
            const s = getCurrentScenario();
            let title = "（無題）";
            if (s && id){
              const memo = getKpMemoById(s, String(id));
              if (memo && memo.title && String(memo.title).trim()) title = String(memo.title).trim();
            }
            hint.dataset.kpId = id || "";
            hint.querySelector(".kp-title").textContent = title;
            hint.style.display = "inline-flex";
          } else {
            hint.style.display = "none";
          }
        }catch{
          hint.style.display = "none";
        }
      });
    }
  }catch{}
}

  /**
   * Character Count (章単位)
   */
  function updateCharCount() {
    const el = document.getElementById("charCount");
    if (!el) return;
    const s = getCurrentScenario();
    if (!s) { el.textContent = "0 字"; return; }
    const chId = s.currentChapterId;
    const ch = (s.chapters || []).find(c => c.id === chId);
    if (!ch) { el.textContent = "0 字"; return; }
    let total = 0;
    (ch.scenes || []).forEach(sc => {
      total += stripHtmlToText(sc.body || "").length;
    });
    el.textContent = total.toLocaleString() + " 字";
  }

  // Debounced char count update

  /**

  const __sceneCollapsed = new Set();

  function toggleSceneCollapse(sceneId) {
    if (__sceneCollapsed.has(sceneId)) {
      __sceneCollapsed.delete(sceneId);
      // Lazy init: if scene was collapsed and has no Quill yet, re-render the editor
      const bodyWrap = document.querySelector(`#sc-${CSS.escape(sceneId)} .scene-body-wrap`);
      if (bodyWrap && !bodyWrap.querySelector('.ql-editor')) {
        captureScroll();
        renderEditor();
        restoreScroll();
        return;
      }
    } else {
      __sceneCollapsed.add(sceneId);

    const bodyWrap = document.querySelector(`#sc-${CSS.escape(sceneId)} .scene-body-wrap`);
    const btn = document.querySelector(`#sc-${CSS.escape(sceneId)} .scene-collapse-btn`);
    if (bodyWrap) bodyWrap.classList.toggle("collapsed", __sceneCollapsed.has(sceneId));
    if (btn) btn.classList.toggle("collapsed", __sceneCollapsed.has(sceneId));
  }

  /**
   * Chapter Duplicate (章の複製)
   */
  function duplicateChapter(s, chapterId) {
    const ch = (s.chapters || []).find(c => c.id === chapterId);
    if (!ch) return;
    const clone = structuredClone(ch);
    clone.id = generateId();
    clone.title = ch.title + "（複製）";
    (clone.scenes || []).forEach(sc => { sc.id = generateId(); });
    const idx = s.chapters.indexOf(ch);
    s.chapters.splice(idx + 1, 0, clone);
    s.currentChapterId = clone.id;
    s.updatedAt = Date.now();
    saveApp();
    setHashChapter(clone.id, { push: true });
    renderEditor();
    showToast("章を複製しました");
  }

  /**
   * Inline KP Notes — View Mode
   * Injects KP notes at anchor positions in rendered HTML.
   */
  function injectKpNotesInView(contentDiv, sceneId, scenario) {
    if (!contentDiv || !scenario) return;
    ensureKpMemos(scenario);
    const sid = String(sceneId || "");
    const memos = (scenario.kpMemos || []).filter(n => n.sceneId === sid);
    if (memos.length === 0) return;

    const memoMap = new Map();
    memos.forEach(m => memoMap.set(m.id, m));

    // Find anchors and inject KP blocks after them
    const anchors = contentDiv.querySelectorAll(".kp-anchor[data-kp-id]");
    const injectedIds = new Set();

    anchors.forEach(anchor => {
      const memoId = anchor.dataset.kpId || anchor.getAttribute("data-kp-id");
      if (!memoId) return;
      const memo = memoMap.get(memoId);
      if (!memo) return;
      injectedIds.add(memoId);

      const block = createKpInlineViewBlock(memo);

      // Insert after the anchor's parent paragraph, or after the anchor itself
      const parentP = anchor.closest("p, div:not(.view-content)");
      const insertAfter = parentP || anchor;
      if (insertAfter.parentNode) {
        insertAfter.parentNode.insertBefore(block, insertAfter.nextSibling);
      }
    });

    // Add orphan memos (those without anchors in this scene)
    const orphans = memos.filter(m => !injectedIds.has(m.id));
    if (orphans.length > 0) {
      const orphanSection = document.createElement("div");
      orphanSection.className = "kp-orphan-section";
      const orphanTitle = document.createElement("div");
      orphanTitle.className = "kp-orphan-title";
      orphanTitle.textContent = "🔒 その他のKPメモ";
      orphanSection.appendChild(orphanTitle);
      orphans.forEach(m => {
        orphanSection.appendChild(createKpInlineViewBlock(m));
      });
      contentDiv.appendChild(orphanSection);
    }
  }

  function createKpInlineViewBlock(memo) {
    const block = document.createElement("div");
    block.className = "kp-inline-view";
    block.dataset.kpId = memo.id;

    const head = document.createElement("div");
    head.className = "kp-inline-view-head";
    const badge = document.createElement("span");
    badge.className = "kp-inline-view-badge";
    badge.textContent = "🔒";
    const title = document.createElement("span");
    title.className = "kp-inline-view-title";
    title.textContent = (memo.title && memo.title.trim()) ? memo.title : "KPメモ";

    const copyBtn = document.createElement("button");
    copyBtn.type = "button";
    copyBtn.className = "kp-inline-view-copy";
    copyBtn.textContent = "Copy";
    copyBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const ok = await copyTextToClipboard(String(memo.body || "").replace(/\s+$/,""));
      showToast(ok ? "コピーしました！" : "コピーに失敗しました");
    });

    head.appendChild(badge);
    head.appendChild(title);
    head.appendChild(copyBtn);

    const body = document.createElement("div");
    body.className = "kp-inline-view-body";
    body.textContent = memo.body || "（内容なし）";

    block.appendChild(head);
    block.appendChild(body);
    return block;
  }

  /**
   * JSON Export / Import
   */
  function downloadTextFile(filename, text) {
    const blob = new Blob([text], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function reIdScenario(originalScenario) {
    // Deep clone then re-ID chapters/scenes to avoid collisions.
    const s = structuredClone(originalScenario || {});
    s.id = generateId();
    s.mode = "edit";
    s.updatedAt = Date.now();
    if (!Array.isArray(s.chapters)) s.chapters = [];

    s.chapters.forEach(ch => {
      ch.id = generateId();
      if (!Array.isArray(ch.scenes)) ch.scenes = [];
      ch.scenes.forEach(sc => {
        sc.id = generateId();
        if (!Array.isArray(sc.tags)) sc.tags = [];
        if (!SCENE_STATUS[sc.status]) sc.status = "unused";
        if (!("body" in sc)) sc.body = "";
      });
    });

    s.currentChapterId = s.chapters[0]?.id || null;
    normalizeScenarioData(s);
    return s;
  }

  function importJSONFromText(text) {
    let data;
    try { data = JSON.parse(text); } catch { alert("JSONの読み込みに失敗しました。"); return; }

    let scenarios = null;

    if (data && typeof data === "object") {
      if (Array.isArray(data.scenarios)) scenarios = data.scenarios;
      else if (data.app && Array.isArray(data.app.scenarios)) scenarios = data.app.scenarios;
      else if (data.scenario && typeof data.scenario === "object") scenarios = [data.scenario];
      else if (data.chapters || data.title) scenarios = [data]; // scenario single
    }

    if (!scenarios || scenarios.length === 0) {
      alert("取り込めるシナリオが見つかりませんでした。");
      return;
    }

    const imported = scenarios.map(reIdScenario);
    app.scenarios.unshift(...imported);
    app.currentScenarioId = imported[0].id;
    saveApp();
    renderEditor();
    showToast("JSONを読み込みました");
  }

  /**
   * Full-text Search
   */
  function stripHtmlToText(html) {
    if (!html) return "";
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    return (tmp.textContent || tmp.innerText || "").replace(/\s+/g, " ").trim();
  }

  function buildSearchIndex(s) {
    normalizeScenarioData(s);
    const rows = [];
    (s.chapters || []).forEach(ch => {
      (ch.scenes || []).forEach(sc => {
        const bodyText = stripHtmlToText(sc.body);
        rows.push({
          chapterId: ch.id,
          chapterTitle: ch.title || "",
          sceneId: sc.id,
          sceneTitle: sc.title || "",
          tags: Array.isArray(sc.tags) ? sc.tags.join(", ") : "",
          status: SCENE_STATUS[sc.status]?.label || "",
          bodyText
        });
      });
    });
    return rows;
  }

  function openSearch() {
    const modal = document.getElementById("searchModal");
    const input = document.getElementById("searchInput");
    if (!modal || !input) return;
    modal.classList.add("show");
    modal.setAttribute("aria-hidden", "false");
    input.value = "";
    updateSearchResults("");
    setTimeout(() => input.focus(), 0);
  }

  function closeSearch() {
    const modal = document.getElementById("searchModal");
    if (!modal) return;
    modal.classList.remove("show");
    modal.setAttribute("aria-hidden", "true");
  }

  function updateSearchResults(query) {
    const s = getCurrentScenario();
    const resultsEl = document.getElementById("searchResults");
    if (!resultsEl) return;
    resultsEl.innerHTML = "";

    if (!s) {
      resultsEl.innerHTML = `<div style="padding:16px; color:var(--text-muted);">検索できるシナリオがありません。</div>`;
      return;
    }

    const q = (query || "").trim().toLowerCase();
    const index = buildSearchIndex(s);

    const hits = q
      ? index.filter(r => {
          const hay = (r.chapterTitle + " " + r.sceneTitle + " " + r.tags + " " + r.status + " " + r.bodyText).toLowerCase();
          return hay.includes(q);
        })
      : index.slice(0, 30); // empty query: show first scenes as quick jump

    if (hits.length === 0) {
      resultsEl.innerHTML = `<div style="padding:16px; color:var(--text-muted);">該当なし</div>`;
      return;
    }

    const limit = 80;
    hits.slice(0, 200).forEach(r => {
      const item = document.createElement("div");
      item.className = "search-item";
      const snippetSource = r.bodyText || "";
      const snippet = snippetSource.length > limit ? snippetSource.slice(0, limit) + "…" : snippetSource;
      item.innerHTML = `
        <div class="si-title">${escapeHtml(r.sceneTitle || "（無題）")}</div>
        <div class="si-meta">章: ${escapeHtml(r.chapterTitle || "（無題）")} / ${escapeHtml(r.status || "")}${r.tags ? " / タグ: " + escapeHtml(r.tags) : ""}</div>
        <div class="si-snippet">${escapeHtml(snippet)}</div>
      `;
      item.onclick = () => {
        closeSearch();
        jumpToScene(r.chapterId, r.sceneId);
      };
      resultsEl.appendChild(item);
    });
  }

  function jumpToScene(chapterId, sceneId) {

    setHashChapter(chapterId, { push: false });
    saveApp();

      if (el) {

        el.classList.add("jump-flash");
        setTimeout(() => { try { el.classList.remove("jump-flash"); } catch {} }, 900);
      }
    }, 0);
  }

static initSortable(gridElement, containerNode) {
  // Prevent multiple Sortable instances on the same grid (re-render / append cases)
  try {
    if (gridElement.__sortable) {
      gridElement.__sortable.destroy();
      gridElement.__sortable = null;
    }
  } catch {}

  // In View mode we still keep the markup, but we do not want drag behavior to interfere with navigation.
  // Use delay/distance to avoid accidental drags that can leave "fallback" artifacts covering the UI.
  gridElement.__sortable = new Sortable(gridElement, {
    animation: 150,
    draggable: ".gallery-item",
    handle: ".img-handle",
    delay: 160,
    delayOnTouchOnly: true,
    distance: 6,

    onStart: () => { document.body.classList.add('sortable-dragging'); },
    onCancel: () => { try { document.body.classList.remove('sortable-dragging'); } catch {} cleanupSortableArtifacts(); },
    ghostClass: "sortable-ghost",

    filter: ".img-x",
    preventOnFilter: true,

    // Fallback is useful across browsers, but can leave artifacts if the drag is interrupted.
    // We keep it, and aggressively clean up in multiple lifecycle hooks.
    forceFallback: true,
    fallbackOnBody: false,

    onEnd: () => {
      try { document.body.classList.remove('sortable-dragging'); } catch {}
      cleanupSortableArtifacts();
      const newImages = Array.from(gridElement.querySelectorAll(".gallery-item img"))
        .map(img => img.getAttribute("src"))
        .filter(Boolean);

      containerNode.dataset.images = JSON.stringify(newImages);

      if (newImages.length === 0) {
        containerNode.dispatchEvent(new CustomEvent("gallery-empty", { bubbles: true }));
      } else {
        containerNode.dispatchEvent(new Event("gallery-changed", { bubbles: true }));
      }
    }
  });
}


    static renderImages(grid, images) {
      grid.innerHTML = "";
      images.forEach((src) => {
        const item = document.createElement("div");
        item.className = "gallery-item";

        const img = document.createElement("img");
        img.src = src;
        img.draggable = false;

        // Drag handle (to avoid accidental drag that can interfere with text input)
        const handle = document.createElement("div");
        handle.className = "img-handle";
        handle.textContent = "≡";

        // Delete button
        const btn = document.createElement("div");
        btn.className = "img-x";
        btn.textContent = "×";

        // Prevent Sortable/Quill from treating delete as drag or selection
        ["pointerdown","mousedown","touchstart"].forEach(ev => {
          btn.addEventListener(ev, (e) => { e.preventDefault(); e.stopPropagation(); }, true);
        });

        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          item.remove();

          const currentList = Array.from(grid.querySelectorAll(".gallery-item img"))
            .map(x => x.getAttribute("src"))
            .filter(Boolean);

          const galleryNode = grid.closest(".img-gallery");
          if (galleryNode) {
            galleryNode.dataset.images = JSON.stringify(currentList);
            if (currentList.length === 0) {
              galleryNode.dispatchEvent(new CustomEvent("gallery-empty", { bubbles: true }));
            } else {
              galleryNode.dispatchEvent(new Event("gallery-changed", { bubbles: true }));
            }
          }
        }, true);

        item.appendChild(img);
        item.appendChild(handle);
        item.appendChild(btn);
        grid.appendChild(item);
      });
    }
  }
  Quill.register(ImgGalleryBlot, true);

// Quillのイベント干渉を防ぐためのヘルパー（Widget内の入力を優先）
function stopQuillPropagation(element) {
  try {
    if (!element || element.__trpgStopQuillPropagation) return;
    element.__trpgStopQuillPropagation = true;

    // Stop Quill from hijacking events inside widgets.
    let events = [
      "keydown","keypress","keyup",
      "beforeinput","input",
      "compositionstart","compositionupdate","compositionend",
      "paste","copy","cut",
      "mousedown","mouseup","click","dblclick","contextmenu",
      "pointerdown","pointerup","touchstart"
    ];

    events.forEach((evtName) => {
      element.addEventListener(evtName, (e) => {
        e.stopPropagation();
      }, true);
    });
  } catch {
    // ignore
  }
}






// --- Skill Check Widget (BlockEmbed) [Stable: no DOM attribute writes on input] ---
class SkillCheckBlot extends BlockEmbed {
  static blotName = "skillcheck";
  static tagName = "DIV";
  static className = "skill-check-widget";

  static create(value) {
    const node = super.create();
    node.setAttribute("contenteditable", "false");

    const payload = {
      name: (value && value.name) ? String(value.name) : "技能判定",
      success: (value && value.success) ? String(value.success) : "",
      failure: (value && value.failure) ? String(value.failure) : ""
    };
    node.dataset.payload = JSON.stringify(payload);

    // --- Header ---
    const head = document.createElement("div");
    head.className = "skill-check-head";

    const icon = document.createElement("span");
    icon.textContent = "🎲";

    const nameInput = document.createElement("input");
    nameInput.className = "skill-name-input";
    nameInput.type = "text";
    nameInput.value = payload.name;
    // Initial paint only (for persistence in raw HTML when exported)
    nameInput.setAttribute("value", payload.name);
    nameInput.placeholder = "技能名";

    stopQuillPropagation(nameInput);

    // IMPORTANT: do NOT mutate dataset/value attribute here (Quill MutationObserver can force redraw)
    nameInput.addEventListener("input", () => {
      // Save on focusout (handled globally) to keep caret stable.
    });

    head.appendChild(icon);
    head.appendChild(nameInput);

    const actions = document.createElement("div");
    actions.className = "skill-check-actions";
    const delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "skill-del-btn";
    delBtn.textContent = "×";
    delBtn.title = "削除";
    actions.appendChild(delBtn);
    head.appendChild(actions);

    // --- Body ---
    const body = document.createElement("div");
    body.className = "skill-check-body";

    const mkCol = (kind, labelText, initVal) => {
      const col = document.createElement("div");
      col.className = "skill-check-col " + kind;

      const top = document.createElement("div");
      top.className = "skill-check-col-head";
      top.innerHTML = `<div class="skill-check-label">${labelText}</div>`;

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "skill-copy-btn";
      btn.dataset.result = kind;
      btn.textContent = "Copy";
      top.appendChild(btn);

      const ta = document.createElement("textarea");
      ta.className = "skill-textarea";
      ta.dataset.result = kind;
      ta.value = initVal;
      // Initial paint only
      ta.textContent = initVal;
      ta.placeholder = kind === "success" ? "成功時テキスト…" : "失敗時テキスト…";
      ta.rows = 1;
      
      // Prevent Quill from stealing selection while typing inside the widget.
      stopQuillPropagation(ta);

      // Auto-grow textarea: prefer CSS field-sizing when supported (avoids Quill mutation side effects)
      const supportsFieldSizing = (typeof CSS !== "undefined" && CSS.supports && CSS.supports("field-sizing", "content"));

      if (!supportsFieldSizing) {
      const fitTa = () => {

              try {

                ta.style.height = "auto";

                ta.style.height = ta.scrollHeight + "px";

              } catch {}

            };

            // 初期表示（既存テキスト量に合わせて伸縮）

            try { requestAnimationFrame(fitTa); } catch { fitTa(); }



            const scheduleFitTa = () => {

              try { requestAnimationFrame(fitTa); } catch { setTimeout(fitTa, 0); }

            };



            // IMPORTANT: do NOT mutate dataset/textContent here

            // Use capture to ensure this runs even when propagation is stopped for Quill.

            ta.addEventListener("input", scheduleFitTa, true);

            // Some environments delay scrollHeight updates until after key/composition completes

            ta.addEventListener("keyup", (e) => { if (e && e.key === "Enter") scheduleFitTa(); }, true);

            ta.addEventListener("compositionend", scheduleFitTa, true);



            }

      col.appendChild(top);
      col.appendChild(ta);
      return col;
    };

    body.appendChild(mkCol("success", "成功時", payload.success));
    body.appendChild(mkCol("failure", "失敗時", payload.failure));

    node.appendChild(head);
    node.appendChild(body);
    return node;
  }

  static value(node) {
    // Prefer live values if available (editor runtime)
    try {
      const nameEl = node.querySelector && node.querySelector(".skill-name-input");
      const sEl = node.querySelector && node.querySelector('.skill-textarea[data-result="success"]');
      const fEl = node.querySelector && node.querySelector('.skill-textarea[data-result="failure"]');
      if (nameEl || sEl || fEl) {
        return {
          name: String((nameEl && (nameEl.value || nameEl.getAttribute("value"))) || "技能判定"),
          success: String((sEl && (sEl.value || sEl.textContent)) || ""),
          failure: String((fEl && (fEl.value || fEl.textContent)) || "")
        };
      }
    } catch {}

    // Fallback to stored payload
    try {
      const p = JSON.parse(node.dataset.payload || "{}");
      return {
        name: String(p.name || "技能判定"),
        success: String(p.success || ""),
        failure: String(p.failure || "")
      };
    } catch {
      return { name: "技能判定", success: "", failure: "" };
    }
  }
}
Quill.register(SkillCheckBlot, true);

function readFiles(files) {
    // Read and downscale images to keep the app responsive and avoid oversized localStorage payloads.
    // Output is a dataURL (JPEG) capped at a reasonable dimension.
    const maxDim = IMAGE_MAX_DIM; // px
    const quality = IMAGE_JPEG_QUALITY;

    const toDataURL = (file) => new Promise(resolve => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.readAsDataURL(file);
    });

    const downscale = (dataUrl) => new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        try {
          const w = img.naturalWidth || img.width;
          const h = img.naturalHeight || img.height;
          const scale = Math.min(1, maxDim / Math.max(w, h));
          const cw = Math.max(1, Math.round(w * scale));
          const ch = Math.max(1, Math.round(h * scale));

          const canvas = document.createElement('canvas');
          canvas.width = cw;
          canvas.height = ch;
          const ctx = canvas.getContext('2d', { alpha: false });
          ctx.drawImage(img, 0, 0, cw, ch);

          // Use JPEG to reduce size; if transparency is needed, users can reinsert PNG via smaller assets.
          const out = canvas.toDataURL('image/jpeg', quality);
          resolve(out);
        } catch {
          resolve(dataUrl);
        }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });

    const imgs = Array.from(files || []).filter(f => f && f.type && f.type.startsWith("image/"));
    return Promise.all(imgs.map(async (f) => {
      const raw = await toDataURL(f);
      return await downscale(raw);
    }));
  }

function setupSkillAndKpWidgets(q, onContentChange, isView) {
  if (!q || !q.root) return;

  // 入力中のDOM(root)には一切触れず、ディープコピーを作成してそこに値を焼き付けてからHTMLを返す
  const getHtml = () => {
    // 1. 現在のDOMツリーをメモリ上で複製（クローン）
    const clone = root.cloneNode(true);

    // 2. 生きているDOM（入力値を持っている）と、クローン（保存用）のWidgetをそれぞれ取得
    const liveWidgets = root.querySelectorAll('.kp-note, .skill-check-widget');
    const cloneWidgets = clone.querySelectorAll('.kp-note, .skill-check-widget');

    // 3. 生の入力値をクローン側に転写する
    liveWidgets.forEach((liveNode, index) => {
      const cloneNode = cloneWidgets[index];
      if (!cloneNode) return;

      // --- KPメモの同期 ---
      if (liveNode.classList.contains('kp-note')) {
        const liveTa = liveNode.querySelector('.kp-note-text');
        const cloneTa = cloneNode.querySelector('.kp-note-text');
        const liveTitle = liveNode.querySelector('.kp-note-title-input');
        const cloneTitle = cloneNode.querySelector('.kp-note-title-input');

        const payload = { title: '', text: '' };

        if (liveTitle && cloneTitle) {
          const val = liveTitle.value || '';
          cloneTitle.setAttribute('value', val);
          payload.title = val;
        }
        if (liveTa && cloneTa) {
          const val = liveTa.value || '';
          cloneTa.textContent = val;
          payload.text = val;
        }
        try {
          cloneNode.dataset.payload = JSON.stringify(payload);
        } catch {}
      }

      // --- 技能判定ボックスの同期 ---
      if (liveNode.classList.contains('skill-check-widget')) {
        const liveName = liveNode.querySelector('.skill-name-input');
        const cloneName = cloneNode.querySelector('.skill-name-input');

        const liveTaS = liveNode.querySelector('.skill-textarea[data-result="success"]');
        const cloneTaS = cloneNode.querySelector('.skill-textarea[data-result="success"]');

        const liveTaF = liveNode.querySelector('.skill-textarea[data-result="failure"]');
        const cloneTaF = cloneNode.querySelector('.skill-textarea[data-result="failure"]');

        const payload = { name: '', success: '', failure: '' };

        if (liveName && cloneName) {
          const val = liveName.value || '';
          cloneName.setAttribute('value', val); // inputはvalue属性にセット
          payload.name = val;
        }
        if (liveTaS && cloneTaS) {
          const val = liveTaS.value || '';
          cloneTaS.textContent = val; // textareaはtextContentにセット
          payload.success = val;
        }
        if (liveTaF && cloneTaF) {
          const val = liveTaF.value || '';
          cloneTaF.textContent = val;
          payload.failure = val;
        }
        // クローン側のdataset更新
        cloneNode.dataset.payload = JSON.stringify(payload);
      }
    });

    // 4. 入力中の画面には影響を与えず、整形済みのクローンのHTMLを返す
    return clone.innerHTML;
  };

  const markDirty = () => {
    if (state.isView) return;
    scheduleScenarioSave(state.onContentChange, getHtml);
  };

  state.getHtml = getHtml;
  state.markDirty = markDirty;

  // --- Readonly設定 (画面描画時) ---
  try {
    root.querySelectorAll('.kp-note').forEach(n => {
      if (state.isView) n.classList.add('readonly');
      else n.classList.remove('readonly');
      const ta = n.querySelector('.kp-note-text');
      if (ta) ta.toggleAttribute('disabled', !!state.isView);
    });
    root.querySelectorAll('.skill-check-widget').forEach(w => {
      if (state.isView) w.classList.add('readonly');
      else w.classList.remove('readonly');
      const name = w.querySelector('.skill-name-input');
      // Some older payloads may contain plain <textarea> without class. Normalize here.
      const tas = w.querySelectorAll('textarea');
      if (name) name.toggleAttribute('disabled', !!state.isView);

      // Detect CSS field-sizing support once per call.
      const supportsFieldSizing = (typeof CSS !== "undefined" && CSS.supports && CSS.supports("field-sizing", "content"));

      tas.forEach(t => {
        try {
          // Ensure consistent styling hooks
          t.classList.add('skill-textarea');

          // Infer result kind if missing
          if (!t.dataset.result) {
            const col = t.closest('.skill-check-col');
            if (col && col.classList.contains('success')) t.dataset.result = 'success';
            else if (col && col.classList.contains('failure')) t.dataset.result = 'failure';
          }

          t.toggleAttribute('disabled', !!state.isView);

          // In edit mode, avoid inline height mutations (they lock the box and break auto-grow after mode switch).
          // Prefer CSS field-sizing:content where supported.
          if (!state.isView) {

            } else {

  if (root.__trpgSkillKpInstalled) return;
  root.__trpgSkillKpInstalled = true;

  // --- Focus shield: disable Quill while typing inside widgets to prevent caret stealing ---
  // Quill attaches some document/root listeners early and can re-focus the editor while IME/input is active.
  // We temporarily disable Quill when an input/textarea inside our widgets is focused, and re-enable on exit.
  const maybeDisableQuillForWidget = (targetEl) => {
    try {
      const st = root.__trpgSkillKpState;
      if (!st || st.isView) return;
      if (!targetEl || !(targetEl instanceof HTMLElement)) return;
      if (!targetEl.matches('.kp-note-text, .kp-note-title-input, .skill-name-input, .skill-textarea')) return;

      if (!st.__quillDisabledByWidget) {
        st.__quillDisabledByWidget = true;
        st.__quillWasEnabled = (typeof q.isEnabled === 'function') ? !!q.isEnabled() : true;
        try { q.enable(false); } catch {}
      }
    } catch {}
  };

  const maybeEnableQuillAfterWidget = () => {
    try {
      const st = root.__trpgSkillKpState;
      if (!st || st.isView) return;
      if (!st.__quillDisabledByWidget) return;

      const a = document.activeElement;
      if (a && a instanceof HTMLElement && a.matches('.kp-note-text, .kp-note-title-input, .skill-name-input, .skill-textarea')) {
        return; // still inside widget input
      }
      // restore previous enabled state (default: enabled)
      st.__quillDisabledByWidget = false;
      const shouldEnable = (st.__quillWasEnabled !== false);
      try { q.enable(shouldEnable); } catch {}
    } catch {}
  };

  root.addEventListener('focusin', (e) => {
    const t = e && e.target ? e.target : null;
    maybeDisableQuillForWidget(t);
  }, true);

  root.addEventListener('focusout', () => {

  root.addEventListener('widget-updated', () => {

    if (!st || st.isView) return;
    st.markDirty && st.markDirty();
  }, true);

  // focusoutでの保存トリガー（入力中に再描画・フォーカス喪失を起こさないためinputでは保存しない）
  root.addEventListener('focusout', (e) => {
    const st = root.__trpgSkillKpState;
    if (!st || st.isView) return;
    const t = e && e.target ? e.target : null;
    if (!t || !(t instanceof HTMLElement)) return;
    if (t.matches('.kp-note-text, .kp-note-title-input, .skill-name-input, .skill-textarea')) {
      st.markDirty && st.markDirty();
    }
  }, true);

  // --- Protect widgets from Backspace/Delete (×ボタンのみで削除) ---
  const trpgProtectEmbedKeydown = (e) => {
    const st = root.__trpgSkillKpState;
    if (!st || st.isView) return;
    const qq = st.q;
    if (!qq) return;

    const key = e && e.key ? String(e.key) : '';
    if (key !== 'Backspace' && key !== 'Delete') return;

    // In-widget inputs already stop propagation; this is for Quill selection cases
    const range = qq.getSelection();
    if (!range) return;

    const isProtectedOp = (op) => {
      if (!op || typeof op !== 'object') return false;
      const ins = op.insert;
      if (!ins || typeof ins !== 'object') return false;
      return !!(ins.kpnote || ins.skillcheck);
    };

    const isProtectedLeaf = (leaf) => {
      try {
        const bn = leaf && leaf.statics && leaf.statics.blotName ? String(leaf.statics.blotName) : '';
        return bn === 'kpnote' || bn === 'skillcheck';
      } catch {
        return false;
      }
    };

    let blocked = false;

    if (range.length && range.length > 0) {
      try {
        const d = qq.getContents(range.index, range.length);
        blocked = !!(d && d.ops && d.ops.some(isProtectedOp));

      if (!blocked) {

          const [leaf] = qq.getLeaf(range.index);

        } catch {}
      }
    } else {
      const idx = key === 'Backspace' ? (range.index - 1) : range.index;
      if (idx >= 0) {
        try {
          const [leaf] = qq.getLeaf(idx);
          blocked = isProtectedLeaf(leaf);
        } catch {}
      }
    }

    if (blocked) {
      e.preventDefault();
      e.stopPropagation();
    }
  };

// ※ 旧実装の「先頭アンカー + CSSシフト」は廃止。

const focusWidgetAtIndex = (qq, index, widgetSelector, focusSelector) => {

      const focusEl = widget ? widget.querySelector(focusSelector) : null;
      if (focusEl && typeof focusEl.focus === 'function') focusEl.focus();

};

const getLineInfoAtIndex = (qq, index) => {
  const [line, offset] = qq.getLine(index);
  if (!line) return null;
  const start = index - offset;
  const len = line.length(); // includes trailing \n
  let formats = {};
  try { formats = line.formats ? (line.formats() || {}) : {}; } catch { formats = {}; }
  return { line, start, len, formats };
};

// Group consecutive copybox-formatted lines as one movable block.
// This prevents "partial unboxing" when a copybox spans multiple Quill lines.
const getGroupRangeAtLineStart = (qq, lineStart) => {
  const base = getLineInfoAtIndex(qq, lineStart);
  if (!base) return null;

  const isCopy = !!(base.formats && base.formats.copybox);
  if (!isCopy) return { start: base.start, len: base.len };

  let start = base.start;
  let len = base.len;

  // Expand upward
  while (start > 0) {
    const probe = start - 1;
    const prev = getLineInfoAtIndex(qq, probe);
    if (!prev) break;
    if (!(prev.formats && prev.formats.copybox)) break;
    start = prev.start;
    len += prev.len;
  }

  // Expand downward
  while (true) {
    const probe = start + len;
    if (probe >= qq.getLength() - 1) break;
    const next = getLineInfoAtIndex(qq, probe);
    if (!next) break;
    if (!(next.formats && next.formats.copybox)) break;
    len += next.len;
  }

  return { start, len };
};

const getGroupRangeAtIndex = (qq, index) => {
  const info = getLineInfoAtIndex(qq, index);
  if (!info) return null;
  return getGroupRangeAtLineStart(qq, info.start);
};

const getGroupRangeAtEmbed = (qq, embedEl) => {
  const blot = Quill.find(embedEl);
  if (!blot) return null;
  const at = qq.getIndex(blot);
  return getGroupRangeAtIndex(qq, at);
};

const deleteKpNoteLine = (noteEl) => {
  const st = root.__trpgSkillKpState;
  if (!st || st.isView) return;
  const qq = st.q;
  if (!qq) return;

  const rng = getGroupRangeAtEmbed(qq, noteEl);
  if (!rng) return;

  qq.deleteText(rng.start, rng.len, 'user');
  st.markDirty && st.markDirty();
  qq.setSelection(Math.min(rng.start, qq.getLength() - 1), 0, 'silent');
};

const moveKpNoteLine = (noteEl, dir) => {
  const st = root.__trpgSkillKpState;
  if (!st || st.isView) return;
  const qq = st.q;
  if (!qq) return;

  const cur = getGroupRangeAtEmbed(qq, noteEl);
  if (!cur) return;

  let probe;
  if (dir < 0) {
    if (cur.start <= 0) return;
    probe = cur.start - 1;
  } else {
    probe = cur.start + cur.len;
    if (probe >= qq.getLength() - 1) return;
  }

  const adj = getGroupRangeAtIndex(qq, probe);
  if (!adj) return;

  // Ensure the two groups are truly adjacent (no gap).
  if (dir < 0) {
    if (adj.start + adj.len !== cur.start) return;
  } else {
    if (cur.start + cur.len !== adj.start) return;
  }

  const Delta = Quill.import('delta');
  const curDelta = qq.getContents(cur.start, cur.len);
  const adjDelta = qq.getContents(adj.start, adj.len);

  const firstStart = Math.min(cur.start, adj.start);
  const secondStart = Math.max(cur.start, adj.start);
  const secondEnd = secondStart + (secondStart === cur.start ? cur.len : adj.len);
  const deleteLen = secondEnd - firstStart;

  // Build swapped delta
  let insertDelta;
  let newStart;
  if (dir < 0) {
    // [ADJ][CUR] -> [CUR][ADJ]
    insertDelta = new Delta().concat(curDelta).concat(adjDelta);
    newStart = adj.start;
  } else {
    // [CUR][ADJ] -> [ADJ][CUR]
    insertDelta = new Delta().concat(adjDelta).concat(curDelta);
    newStart = cur.start + adj.len;
  }

  qq.updateContents(new Delta().retain(firstStart).delete(deleteLen).concat(insertDelta), 'user');
  st.markDirty && st.markDirty();

  focusWidgetAtIndex(qq, newStart, '.kp-note', '.kp-note-text');
  qq.setSelection(Math.min(newStart + 1, qq.getLength() - 1), 0, 'silent');
};

function createQuill(container, content, isView, onContentChange) {

// Helpers: avoid inserting widgets inside copy-box lines (prevents unintended new copy-box blocks)
const normalizeWidgetInsertIndex = (index) => {
  try {
    const fmt = q.getFormat(index) || {};
    if (fmt.copybox) {
      const [line] = q.getLine(index);
      if (line) return q.getIndex(line) + line.length(); // after the copy-box line
    }
  } catch {}
  return index;
};

const focusWidgetAt = (index, widgetSelector, focusSelector) => {
  setTimeout(() => {
    try {
      const [leaf] = q.getLeaf(index);
      const node = leaf && leaf.domNode ? leaf.domNode : null;
      const el = (node && node.nodeType === 1) ? node : null;
      const widget = el && el.closest ? el.closest(widgetSelector) : null;
      const focusEl = widget ? widget.querySelector(focusSelector) : null;
      if (focusEl && typeof focusEl.focus === 'function') focusEl.focus();
    } catch {}
  }, 0);
};

  // --- View mode rendering helpers (no Quill) ---
  function safeHTMLForView(html) {
    const tpl = document.createElement('template');
    tpl.innerHTML = html || "";

    // Remove potentially dangerous or unsupported nodes
    tpl.content.querySelectorAll('script, iframe, object, embed').forEach(n => n.remove());

    // Strip inline event handlers (onload, onclick, ...)
    tpl.content.querySelectorAll('*').forEach(el => {
      for (const attr of Array.from(el.attributes || [])) {
        if (/^on/i.test(attr.name)) el.removeAttribute(attr.name);
      }
    });

    // --- Widget view-mode normalization ---
    // form要素は value がHTMLに残らないことがあるため、dataset.payload を優先して表示用DOMに変換する
    // 技能判定ボックス
    tpl.content.querySelectorAll('.skill-check-widget').forEach(w => {
      let payload = null;
      try { payload = JSON.parse(w.dataset.payload || '{}'); } catch { payload = {}; }

      // payload が古い/空の場合に備えて、DOM上の input/textarea も参照する
      const nameInput0 = w.querySelector('.skill-name-input');
      const taS0 = w.querySelector('.skill-textarea[data-result="success"], .skill-check-col.success textarea');
      const taF0 = w.querySelector('.skill-textarea[data-result="failure"], .skill-check-col.failure textarea');

      const domName = nameInput0 ? String(nameInput0.getAttribute('value') || nameInput0.value || nameInput0.textContent || '') : '';
      const domSuccess = taS0 ? String(taS0.value || taS0.textContent || '') : '';
      const domFailure = taF0 ? String(taF0.value || taF0.textContent || '') : '';

      const name = (payload && payload.name != null && String(payload.name).trim() !== '') ? String(payload.name) : (domName.trim() || '技能判定');
      const success = (payload && payload.success != null && String(payload.success) !== '') ? String(payload.success) : domSuccess;
      const failure = (payload && payload.failure != null && String(payload.failure) !== '') ? String(payload.failure) : domFailure;


      // name: input -> div
      const nameInput = w.querySelector('.skill-name-input');
      if (nameInput) {
        const viewName = document.createElement('div');
        viewName.className = 'skill-name-view';
        viewName.textContent = name;
        nameInput.replaceWith(viewName);
      }

      // textareas -> div (pre-wrap)
      const taS = w.querySelector('.skill-check-col.success textarea, .skill-check-col.success .skill-textarea');
      const taF = w.querySelector('.skill-check-col.failure textarea, .skill-check-col.failure .skill-textarea');
      if (taS) {
        const d = document.createElement('div');
        d.className = 'skill-text-view';
        d.textContent = success;
        taS.replaceWith(d);
      }
      if (taF) {
        const d = document.createElement('div');
        d.className = 'skill-text-view';
        d.textContent = failure;
        taF.replaceWith(d);
      }

      // viewでは入力不可に
      w.querySelectorAll('input, textarea, select, button[type="submit"]').forEach(el => {
        try { el.setAttribute('disabled', 'disabled'); } catch {}
      });
    });

    // KPメモ (BlockEmbed)
    tpl.content.querySelectorAll('.kp-note').forEach(n => {
      let payload = null;
      try { payload = JSON.parse(n.dataset.payload || '{}'); } catch { payload = {}; }

      // Title
      const titleInput = n.querySelector('.kp-note-title-input');
      const domTitle = titleInput ? String(titleInput.value || titleInput.getAttribute('value') || '') : '';
      const title = (payload && payload.title != null && String(payload.title).trim() !== '') ? String(payload.title) : (domTitle.trim() || 'KPメモ');

      if (titleInput) {
        const viewTitle = document.createElement('span');
        viewTitle.className = 'kp-note-title-view';
        viewTitle.textContent = title;
        titleInput.replaceWith(viewTitle);
      }

      // Body text
      const ta0 = n.querySelector('textarea.kp-note-text');
      const domText = ta0 ? String(ta0.value || ta0.textContent || '') : '';
      const text = (payload && payload.text != null && String(payload.text) !== '') ? String(payload.text) : domText;

      const ta = n.querySelector('textarea.kp-note-text');
      if (ta) {
        const view = document.createElement('div');
        view.className = 'kp-note-view-text';
        view.textContent = text;
        ta.replaceWith(view);
      }

      // viewでは削除・移動は不可（Copyだけ残す）
      n.querySelectorAll('.kp-note-btn.del, .kp-note-btn.up, .kp-note-btn.down').forEach(el => el.remove());
      n.classList.add('readonly');

      // 念のためフォームを無効化
      n.querySelectorAll('input, textarea, select').forEach(el => {
        try { el.setAttribute('disabled', 'disabled'); } catch {}
      });
    });

    return tpl.innerHTML;
  }

function setupViewCopyHandler() {
    if (window.__trpg_view_copy_handler_installed) return;
    window.__trpg_view_copy_handler_installed = true;

    // View mode: allow editing scene status via <select>
    dom.paperView.addEventListener('change', (e) => {
      const sel = e.target;
      if (!sel || !(sel instanceof HTMLElement)) return;
      if (!sel.classList.contains('scene-status-select')) return;
      const sceneId = sel.getAttribute('data-scene-id');
      if (!sceneId) return;

      const s = getCurrentScenario();
      if (!s) return;
      normalizeScenarioData(s);

      let found = null;
      for (const ch of (s.chapters || [])) {
        const sc = (ch.scenes || []).find(x => x.id === sceneId);
        if (sc) { found = sc; break; }
      }
      if (!found) return;

      const next = String(sel.value || "unused");
      if (!SCENE_STATUS[next]) return;
      found.status = next;
      s.updatedAt = Date.now();
      saveApp();

      // Re-render to reflect filtering (e.g., hide "used")
      renderEditor();
    }, true);

    // Delegate on the whole paper area (re-render safe)
    dom.paperView.addEventListener('click', async (e) => {
      // Image click (view mode): open modal with original size
      const item = e.target.closest && e.target.closest('.view-content .img-gallery .gallery-item');
      if (item) {
        e.preventDefault();
        e.stopPropagation();
        const innerImg = item.querySelector('img');
        if (innerImg) {
          openImageModal(innerImg.getAttribute('src') || innerImg.src);
        }
        return;
      }

      // Skill check widget copy (view mode)
      const skillBtn = e.target.closest && e.target.closest('.skill-copy-btn');
      if (skillBtn) {
        if (!skillBtn.closest('.view-content')) return;
        e.preventDefault(); e.stopPropagation();

        const widget = skillBtn.closest('.skill-check-widget');
        if (!widget) return;

        const kind = String(skillBtn.dataset.result || '');
        let raw = '';

        // Prefer the rendered view text within the same column
        const col = skillBtn.closest('.skill-check-col');
        if (col) {
          const viewText = col.querySelector('.skill-text-view');
          if (viewText) raw = String(viewText.innerText || viewText.textContent || '');
        }

        // Fallback to dataset.payload (matches safeHTMLForView normalization)
        if (!raw) {
          let payload = null;
          try { payload = JSON.parse(widget.dataset.payload || '{}'); } catch { payload = {}; }
          if (kind === 'success') raw = String(payload.success || '');
          else if (kind === 'failure') raw = String(payload.failure || '');
        }

        // Last resort: original textarea/input content (if any)
        if (!raw) {
          const ta = widget.querySelector('.skill-textarea[data-result="' + kind + '"]');
          if (ta) raw = String(ta.value || ta.textContent || '');
        }

        const txt = String(raw || '').replace(/\s+$/,'');
        if (!txt) { showToast("コピーするテキストが空です"); return; }

        const ok = await copyTextToClipboard(txt);
        if (ok) {
          if (col) {
            col.classList.add('skill-flash');
            setTimeout(() => { try { col.classList.remove('skill-flash'); } catch {} }, 450);
          }
          showToast("コピーしました！");
        } else {
          showToast("コピーに失敗しました（ブラウザ設定をご確認ください）");
        }
        return;
      }

      // KPメモ copy (view mode)
      const kpCopyBtn = e.target.closest && e.target.closest('.kp-note-btn.copy');
      if (kpCopyBtn) {
        if (!kpCopyBtn.closest('.view-content')) return;
        e.preventDefault(); e.stopPropagation();

        const note = kpCopyBtn.closest('.kp-note');
        if (!note) return;

        let raw = '';
        const viewText = note.querySelector('.kp-note-view-text');
        if (viewText) raw = String(viewText.innerText || viewText.textContent || '');

        if (!raw) {
          let payload = null;
          try { payload = JSON.parse(note.dataset.payload || '{}'); } catch { payload = {}; }
          raw = String(payload.text || '');
        }

        const txt = String(raw || '').replace(/\s+$/,'');
        if (!txt) { showToast("コピーするテキストが空です"); return; }

        const ok = await copyTextToClipboard(txt);
        showToast(ok ? "コピーしました！" : "コピーに失敗しました（ブラウザ設定をご確認ください）");
        return;
      }

      // Copy-box click (view mode)
      const box = e.target.closest('.copy-box');
      if (!box) return;

      // Ensure we are in view mode area
      if (!box.closest('.view-content')) return;

      // Copy only the text content inside the box (preserve <br> as \n)
      const clone = box.cloneNode(true);
      clone.querySelectorAll('.copybox-remove').forEach(el => el.remove());
      clone.querySelectorAll('br').forEach(br => br.replaceWith(document.createTextNode('\n')));

      const text = String(clone.textContent || '').replace(/[ \t]+$/,'').replace(/\n+$/,'');
      if (!text) return;

const ok = await copyTextToClipboard(text);
      if (ok) {
        box.classList.add('copy-flash');
        setTimeout(() => box.classList.remove('copy-flash'), 450);
        showToast("コピーしました！");
      } else {
        showToast("コピーに失敗しました（ブラウザ設定をご確認ください）");
      }
    }, true);
  }
