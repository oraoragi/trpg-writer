        collapseBtn.className = "scene-collapse-btn" + (__sceneCollapsed.has(sc.id) ? " collapsed" : "");
        collapseBtn.textContent = "▾";
        collapseBtn.title = "シーンを折りたたむ/展開する";
        collapseBtn.onclick = (e) => { e.stopPropagation(); toggleSceneCollapse(sc.id); };

        scHead.appendChild(collapseBtn);
        scHead.appendChild(scInput);
        scHead.appendChild(metaRow);
        scHead.appendChild(delBtn);
        scBlock.appendChild(scHead);

        const bodyWrap = document.createElement("div");
        bodyWrap.className = "scene-body-wrap" + (__sceneCollapsed.has(sc.id) ? " collapsed" : "");

        const editorArea = document.createElement("div");
        bodyWrap.appendChild(editorArea);

        scBlock.appendChild(bodyWrap);

        // 折りたたまれていなければQuillを初期化
        if (!__sceneCollapsed.has(sc.id)) {
          createQuill(editorArea, sc.body, false, (html) => {
            sc.body = html;
            s.updatedAt = Date.now();
            __hasDirtyChanges = true;
          });
        }

        scenesDiv.appendChild(scBlock);
      };

      ch.scenes.forEach(sc => appendSceneBlock(sc));


      // シーン追加ボタン
      const footer = document.createElement("div");
      footer.style.padding = "10px";
      const addBtn = document.createElement("button");
      addBtn.textContent = "＋ シーン追加";
      addBtn.style.width = "100%";
      addBtn.onclick = () => {
        // 根本対策：シーン追加でエディタ全体を再描画しない（scrollTopを触らない）
        const sc = { id: generateId(), title: "新規シーン", body: "", status: "unused", tags: [] };
        ch.scenes.push(sc);
        s.updatedAt = Date.now();
        saveApp();

        // 追加分だけDOM生成して末尾に足す（現在のスクロール位置はそのまま維持）
        appendSceneBlock(sc);
      };
      footer.appendChild(addBtn);

      chBlock.appendChild(scenesDiv);
      chBlock.appendChild(footer);
      dom.chapters.appendChild(chBlock);

      rendered = true;
    });

    if (!rendered) {
      // 念のため：章が存在するのに描画されない場合は先頭章に戻す
      s.currentChapterId = s.chapters[0]?.id || null;
      saveApp();
      renderEditor();
    }

    updateStickyOffsets();
    try{ ensureActiveKpContext(s); renderKpPanel(); }catch{}
  }

  // 閲覧モード描画 (Stylish & Readable)

  function renderViewMode(s) {
    dom.editorBodyContainer.classList.add("hidden");
    dom.paperView.classList.remove("hidden");
    setupViewCopyHandler();
    try { dom.btnBackToEditFloating.classList.remove("hidden"); } catch {}
    // 閲覧モードではヘッダーも隠して没入感を高める（タイトルはPaper内に表示）
    dom.editorHeader.classList.add("hidden");
    dom.nav.innerHTML = "";

    normalizeScenarioData(s);

    // Hide chapters where all scenes are "used" in view mode
    const visibleChapters = (s.chapters || []).filter(ch => (ch.scenes || []).some(sc => {
      if (!SCENE_STATUS[sc.status]) sc.status = "unused";
      return sc.status !== "used" && sc.status !== "skipped";
    }));

    if (visibleChapters.length === 0) {
      dom.paperContent.innerHTML = "";
      const paperHead = document.createElement("div");
      paperHead.className = "paper-header";
      paperHead.innerHTML = `
        <h1 class="paper-title">${escapeHtml(s.title)}</h1>
        <div class="paper-meta">CHAPTER: （表示できる章がありません）</div>
      `;
      dom.paperContent.appendChild(paperHead);

      const body = document.createElement("div");
      body.className = "paper-body";
      body.innerHTML = `<div style="padding:18px 16px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; color:#374151;">すべてのシーンが「使用済み」または「スキップ」になっているため、閲覧モードでは表示する内容がありません。</div>`;
      dom.paperContent.appendChild(body);
      return;
    }

    // Choose active chapter within visible chapters
    let activeChapterId = ensureCurrentChapter(s);
    if (!visibleChapters.some(ch => ch.id === activeChapterId)) {
      activeChapterId = visibleChapters[0].id;
      s.currentChapterId = activeChapterId;
      saveApp();
    }
    const activeChapter = visibleChapters.find(ch => ch.id === activeChapterId);
    if (!activeChapter) return;

    // サイドバー（章 + 表示中章のシーンのみ）
    let activeScenesNav = null;

    visibleChapters.forEach(ch => {
      const navItem = document.createElement("div");
      navItem.className = "nav-item" + (ch.id === activeChapterId ? " active" : "");
      navItem.textContent = ch.title;
      navItem.onclick = () => setCurrentChapter(s, ch.id);
      dom.nav.appendChild(navItem);

      if (ch.id !== activeChapterId) return;

      // アクティブ章のシーンを章タイトルの直下にまとめる
      activeScenesNav = document.createElement("div");
      activeScenesNav.className = "nav-scenes";
      activeScenesNav.dataset.chapterId = ch.id;
      dom.nav.appendChild(activeScenesNav);

      (ch.scenes || []).forEach(sc => {
        if (!SCENE_STATUS[sc.status]) sc.status = "unused";
        if (sc.status === "used" || sc.status === "skipped") return;
        const subNav = document.createElement("div");
        subNav.className = "nav-item sub";
        subNav.textContent = sc.title;
        subNav.onclick = () => document.getElementById(`view-sc-${sc.id}`)?.scrollIntoView({ behavior: "smooth" });
        activeScenesNav.appendChild(subNav);
      });
    });

    dom.paperContent.innerHTML = "";

    // Paper Header
    const paperHead = document.createElement("div");
    paperHead.className = "paper-header";
    // Calculate chapter stats
    const chScenes = activeChapter.scenes || [];
    let chCharCount = 0;
    chScenes.forEach(sc => { chCharCount += stripHtmlToText(sc.body || "").length; });
    paperHead.innerHTML = `
      <h1 class="paper-title">${escapeHtml(s.title)}</h1>
      <div class="paper-meta">CHAPTER: ${escapeHtml(activeChapter.title)} ─ ${chScenes.length} シーン ／ ${chCharCount.toLocaleString()} 字</div>
    `;
    // KP visibility toggle
    const kpToggle = document.createElement("button");
    kpToggle.type = "button";
    kpToggle.className = "kp-vis-toggle";
    kpToggle.innerHTML = "🔒 KP情報を表示中";
    kpToggle.title = "KP専用メモの表示/非表示を切り替え（PL画面共有時に非表示にできます）";
    kpToggle.onclick = () => {
      const paperBody = dom.paperContent.querySelector(".paper-body");
      if (!paperBody) return;
      const isHidden = paperBody.classList.toggle("kp-hidden");
      kpToggle.innerHTML = isHidden ? "🔒 KP情報を非表示" : "🔒 KP情報を表示中";
      kpToggle.classList.toggle("kp-off", isHidden);
    };
    paperHead.appendChild(kpToggle);
    dom.paperContent.appendChild(paperHead);

    const body = document.createElement("div");
    body.className = "paper-body";

    const chDiv = document.createElement("section");
    chDiv.className = "view-chapter";
    chDiv.id = `view-ch-${activeChapter.id}`;
    chDiv.innerHTML = `<h2 class="view-chapter-title">${activeChapter.title}</h2>`;

    const visibleScenes = (activeChapter.scenes || []).filter(sc => {
      if (!SCENE_STATUS[sc.status]) sc.status = "unused";
      return sc.status !== "used" && sc.status !== "skipped";
    });

    if (visibleScenes.length === 0) {
      // Chapter should not be displayed if no visible scenes
      body.innerHTML = `<div style="padding:18px 16px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; color:#374151;">この章のシーンはすべて「使用済み」または「スキップ」のため、閲覧モードでは表示されません。</div>`;
      dom.paperContent.appendChild(body);
      return;
    }

    visibleScenes.forEach(sc => {
      const scDiv = document.createElement("article");
      scDiv.className = "view-scene";
      scDiv.id = `view-sc-${sc.id}`;
      scDiv.dataset.sceneId = sc.id;
      scDiv.dataset.chapterId = activeChapter.id;
      scDiv.addEventListener("pointerdown", () => { setActiveKpContext(sc.id, activeChapter.id); }, true);
      if (!SCENE_STATUS[sc.status]) sc.status = "unused";
      if (!Array.isArray(sc.tags)) sc.tags = [];
      const statusLabel = SCENE_STATUS[sc.status]?.label || "";
      const tagsHtml = (sc.tags || []).slice(0, 8).map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join("");

      // Status is editable in View mode (select). "使用済" status itself is not displayed as a badge.
      const statusSelectHtml = `
        <select class="scene-status-select" data-scene-id="${escapeHtml(sc.id)}" title="ステータス">
          <option value="unused" ${sc.status === "unused" ? "selected" : ""}>未使用</option>
          <option value="used" ${sc.status === "used" ? "selected" : ""}>使用済</option>
          <option value="skipped" ${sc.status === "skipped" ? "selected" : ""}>スキップ</option>        </select>
      `;
      const badgeHtml = "";
      scDiv.innerHTML = `
        <h3 class="view-scene-title">
          <span>${escapeHtml(sc.title)}</span>
          <span class="scene-meta-row" style="margin-left:auto;">
            ${statusSelectHtml}
            
            ${tagsHtml}
          </span>
        </h3>
      `;

      const contentDiv = document.createElement("div");
      contentDiv.className = "view-content";
      scDiv.appendChild(contentDiv);

      // View mode: render saved HTML directly (avoid Quill clipboard sanitization that can drop custom blocks)
      contentDiv.innerHTML = safeHTMLForView(sc.body);
      // 探索者タグを名前に置換
      replacePcTagsInView(contentDiv, s);
      applyKpNoteShiftsInView(contentDiv);
      // Remove edit-only controls if they exist
      contentDiv.querySelectorAll('.copybox-remove').forEach(el => el.remove());

      chDiv.appendChild(scDiv);
    });

    body.appendChild(chDiv);
    dom.paperContent.appendChild(body);
}

  // ★ 探索者タグ関連
  function renderPcList(s) {
    const pcListEl = document.getElementById("pcList");
    if (!pcListEl) return;
    pcListEl.innerHTML = "";
    if (!s.explorers) s.explorers = [];

    s.explorers.forEach((pc, i) => {
      const row = document.createElement("div");
      row.className = "pc-row";
      row.innerHTML = `
        <span class="pc-label">${escapeHtml(pc.label)}</span>
        <input type="text" value="${escapeHtml(pc.name || '')}" placeholder="名前を入力" data-pc-idx="${i}" />
        <button class="ghost danger" data-pc-del="${i}" style="padding:3px 6px; font-size:11px;">×</button>
      `;
      pcListEl.appendChild(row);
    });

    // イベント委譲
    pcListEl.querySelectorAll("input[data-pc-idx]").forEach(inp => {
      inp.addEventListener("input", (e) => {
        const idx = parseInt(e.target.dataset.pcIdx, 10);
        if (s.explorers[idx]) {
          s.explorers[idx].name = e.target.value;
          s.updatedAt = Date.now();
          __hasDirtyChanges = true;
        }
      });
    });
    pcListEl.querySelectorAll("button[data-pc-del]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(e.target.dataset.pcDel, 10);
        if (confirm(`探索者${s.explorers[idx]?.label}を削除しますか？`)) {
          s.explorers.splice(idx, 1);
          s.updatedAt = Date.now();
          saveApp();
          renderPcList(s);
        }
      });
    });
  }

  function getNextPcLabel(explorers) {
    // A, B, C, ... の次の空きラベルを返す
    const used = new Set((explorers || []).map(e => e.label));
    for (let i = 0; i < 26; i++) {
      const label = String.fromCharCode(65 + i);
      if (!used.has(label)) return label;
    }
    return "X";
  }

  function replacePcTagsInView(container, scenario) {
    if (!container || !scenario) return;
    const pcs = scenario.explorers || [];
    const map = new Map();
    pcs.forEach(pc => map.set(pc.label, pc.name || ('探索者' + pc.label)));

    container.querySelectorAll('.pc-tag').forEach(tag => {
      const label = tag.getAttribute('data-pc-label') || tag.textContent.replace('探索者','').trim();
      const name = map.get(label) || ('探索者' + label);
      const resolved = document.createElement('span');
      resolved.className = 'pc-tag-resolved';
      resolved.textContent = name;
      resolved.title = '探索者' + label;
      tag.replaceWith(resolved);
    });
  }

  /**
   * Actions
   */
  window.openScenario = (id) => {
    app.currentScenarioId = id;
    renderEditor();
  };
  window.deleteScenario = (id) => {
    if(!confirm("本当に削除しますか？")) return;
    app.scenarios = app.scenarios.filter(s => s.id !== id);
    if(app.currentScenarioId === id) app.currentScenarioId = null;
    saveApp(); renderHome();
  };
  window.toggleEditMode = () => {
    cleanupSortableArtifacts();
    closeImageModal();
    const s = getCurrentScenario();
    if(s) {
      s.mode = (s.mode === "view") ? "edit" : "view";
      saveApp(); renderEditor();
    }
  };

  dom.btnNew.onclick = () => {
    const s = {
      id: generateId(),
      title: "新しいシナリオ",
      mode: "edit",
      updatedAt: Date.now(),
      chapters: [{ id: generateId(), title: "第1章", scenes: [{ id: generateId(), title: "導入", body: "<p>ここに本文を入力...</p>", status: "unused", tags: [] }] }]
    };
    
    s.currentChapterId = s.chapters[0]?.id || null;
    app.scenarios.unshift(s);
    app.currentScenarioId = s.id;
    saveApp(); renderEditor();
  };

  dom.btnAddChapter.onclick = () => {
    const s = getCurrentScenario();
    const newId = generateId();
    s.chapters.push({ id: newId, title: "新しい章", scenes: [] });
    s.currentChapterId = newId;
    s.updatedAt = Date.now();
    saveApp();
    setHashChapter(newId, { push: true });
    captureScroll();
    renderEditor();
    restoreScroll();
  };

  dom.btnBackHome.onclick = () => {
    if (isMobileLayout()) closeMobileMenu();
    // Save any pending changes before going home
    if (__hasDirtyChanges) { try { saveApp(); } catch {} }
    app.currentScenarioId = null;
    // Hide any leftover editor UI
    try { dom.btnBackToEditFloating.classList.add("hidden"); } catch {}
    try { dom.editorHeader.classList.add("hidden"); } catch {}
    try { closeKpPanel(); } catch {}
    renderHome();
  };

  dom.btnToggleMode.onclick = toggleEditMode;
  try { if (dom.btnBackToEditFloating) dom.btnBackToEditFloating.onclick = toggleEditMode; } catch {}

  // Manual save button
  try {
    const btnSave = document.getElementById("btnManualSave");
    if (btnSave) btnSave.onclick = () => { saveApp(); showToast("保存しました"); };
  } catch {}

  dom.scenarioTitle.oninput = (e) => {
    const s = getCurrentScenario();
    if (s) { s.title = e.target.value; s.updatedAt = Date.now(); __hasDirtyChanges = true; renderSidebarList(); }
  }

  // ★ 表紙画像の設定
  try {
    const btnSetCover = document.getElementById("btnSetCover");
    const btnRemoveCover = document.getElementById("btnRemoveCover");
    const coverFileInput = document.getElementById("coverFileInput");

    if (btnSetCover) btnSetCover.onclick = () => coverFileInput && coverFileInput.click();

    if (coverFileInput) coverFileInput.addEventListener("change", async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const s = getCurrentScenario();
      if (!s) return;
      // 表紙用に小さめにリサイズ（最大600px、品質0.6）
      const dataUrl = await new Promise(resolve => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.readAsDataURL(file);
      });
      const compressed = await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          try {
            const w = img.naturalWidth || img.width;
            const h = img.naturalHeight || img.height;
            const scale = Math.min(1, 600 / Math.max(w, h));
            const cw = Math.max(1, Math.round(w * scale));
            const ch = Math.max(1, Math.round(h * scale));
            const canvas = document.createElement('canvas');
            canvas.width = cw; canvas.height = ch;
            const ctx = canvas.getContext('2d', { alpha: false });
            ctx.drawImage(img, 0, 0, cw, ch);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          } catch { resolve(dataUrl); }
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
      s.coverImage = compressed;
      s.updatedAt = Date.now();
      saveApp();
      renderEditor();
      coverFileInput.value = "";
    });

    if (btnRemoveCover) btnRemoveCover.onclick = () => {
      const s = getCurrentScenario();
      if (!s) return;
      if (!confirm("表紙画像を削除しますか？")) return;
      delete s.coverImage;
      s.updatedAt = Date.now();
      saveApp();
      renderEditor();
    };
  } catch {}

  // ★ 探索者追加ボタン
  try {
    const btnPcAdd = document.getElementById("btnPcAdd");
    if (btnPcAdd) btnPcAdd.onclick = () => {
      const s = getCurrentScenario();
      if (!s) return;
      if (!s.explorers) s.explorers = [];
      const label = getNextPcLabel(s.explorers);
      s.explorers.push({ label, name: "" });
      s.updatedAt = Date.now();
      saveApp();
      renderPcList(s);
    };
  } catch {}

  // ★ 探索者設定の折りたたみ
  try {
    const pcToggle = document.getElementById("pcSettingsToggle");
    const pcBody = document.getElementById("pcSettingsBody");
    const pcArrow = document.getElementById("pcSettingsArrow");
    if (pcToggle && pcBody) {
      pcToggle.onclick = () => {
        const isHidden = pcBody.style.display === "none";
        pcBody.style.display = isHidden ? "" : "none";
        if (pcArrow) pcArrow.textContent = isHidden ? "▼" : "▶";
      };
    }
  } catch {}


  /**
   * JSON / Search wiring
   */
  try { if (dom.btnExportAllHome) dom.btnExportAllHome.onclick = exportAllAsJSON; } catch {}
  try { if (dom.btnImportHome) dom.btnImportHome.onclick = requestImportJSON; } catch {}
  try { if (dom.btnExportScenario) dom.btnExportScenario.onclick = exportCurrentScenarioAsJSON; } catch {}
try { if (dom.btnSearch) dom.btnSearch.onclick = openSearch; } catch {}
  try { if (dom.btnSearchClose) dom.btnSearchClose.onclick = closeSearch; } catch {}

  // Mobile drawer open/close
  try { if (dom.btnMobileMenuOpenHome) dom.btnMobileMenuOpenHome.onclick = openMobileMenu; } catch {}
  try { if (dom.btnMobileMenuOpenEditor) dom.btnMobileMenuOpenEditor.onclick = openMobileMenu; } catch {}
  try { if (dom.btnMobileMenuClose) dom.btnMobileMenuClose.onclick = closeMobileMenu; } catch {}
  try {
    if (dom.mobileBackdrop) {
      dom.mobileBackdrop.addEventListener("click", () => closeMobileMenu(), { passive: true });
    }
  } catch {}


  // File import handler
  try {
    const fileInput = document.getElementById("fileImport");
    if (fileInput) {
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          importJSONFromText(String(reader.result || ""));
        };
        reader.onerror = () => alert("ファイル読み込みに失敗しました。");
        reader.readAsText(file);
      });
    }
  } catch {}

  // Search modal behaviors
  try {
    const modal = document.getElementById("searchModal");
    const input = document.getElementById("searchInput");
    if (input) {
      input.addEventListener("input", () => updateSearchResults(input.value));
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const first = document.querySelector("#searchResults .search-item");
          if (first) { first.click(); }
        }
      });
    }
    if (modal) {
      modal.addEventListener("mousedown", (e) => {
        if (e.target === modal) closeSearch();
      });
    }
  } catch {}

  // Ctrl+F / Cmd+F opens app search, Ctrl+S / Cmd+S triggers save feedback
  window.addEventListener("keydown", (e) => {
    const isFind = (e.key === "f" || e.key === "F") && (e.ctrlKey || e.metaKey);
    if (isFind) {
      e.preventDefault();
      openSearch();
      return;
    }
    const isSave = (e.key === "s" || e.key === "S") && (e.ctrlKey || e.metaKey);
    if (isSave) {
      e.preventDefault();
      try { saveApp(); showToast("保存しました"); } catch {}
      return;
    }
    if (e.key === "Escape") {
      const modal = document.getElementById("searchModal");
      if (modal && modal.classList.contains("show")) {
        e.preventDefault();
        closeSearch();
      }
    }
  }, true);

// Init
  window.addEventListener("resize", updateStickyOffsets);

  window.addEventListener("hashchange", () => {
    const s = getCurrentScenario();
    if (!s) return;
    const id = parseChapterIdFromHash();
    if (id && s.chapters?.some(ch => ch.id === id) && s.currentChapterId !== id) {
      s.currentChapterId = id;
      saveApp();
      renderEditor();
    }
  });

  // Image modal events
  (function(){
    const modal = document.getElementById('imgModal');
    const closeBtn = document.getElementById('imgModalClose');
    if (closeBtn) closeBtn.addEventListener('click', closeImageModal, true);
    if (modal) {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeImageModal();
      }, true);
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeImageModal();
    }, true);
  })();




</script>
</body>
</html>
